# deploy-infra.yml — Infrastructure Deployment Workflow (T012)
# Deploys Azure infrastructure using OIDC authentication and azd provision.
# Includes what-if validation and manual approval gate before actual deployment.

name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
      skip_what_if:
        description: "Skip what-if validation"
        required: false
        default: false
        type: boolean

  push:
    branches: [main]
    paths:
      - "infra/**"
      - "azure.yaml"

concurrency:
  group: deploy-infra-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

# Required for OIDC authentication with Azure
permissions:
  id-token: write
  contents: read

env:
  # Azure subscription and tenant for OIDC
  # These should be configured as repository variables or environment secrets
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  
  # Azure location for deployment
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
  
  # azd environment name
  AZURE_ENV_NAME: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Validate Infrastructure Changes (What-If)
  # ─────────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      changes_detected: ${{ steps.what_if.outputs.changes_detected }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bicep
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x ./bicep
          sudo mv ./bicep /usr/local/bin/bicep
          bicep --version

      - name: Build Bicep templates
        run: |
          if [ -f infra/main.bicep ]; then
            bicep build infra/main.bicep
          else
            echo "::warning::No main.bicep found — skipping build validation"
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Run What-If Analysis
        id: what_if
        if: ${{ github.event.inputs.skip_what_if != 'true' }}
        run: |
          if [ -f infra/main.bicep ]; then
            echo "Running what-if analysis..."
            
            # Run what-if at subscription scope
            az deployment sub what-if \
              --location "${{ env.AZURE_LOCATION }}" \
              --template-file infra/main.bicep \
              --parameters infra/main.parameters.json \
              --parameters namingPrefix="${{ env.AZURE_ENV_NAME }}" \
              --no-prompt \
              2>&1 | tee what-if-output.txt || true
            
            # Check if there are any changes
            if grep -q "Resource changes" what-if-output.txt; then
              echo "changes_detected=true" >> $GITHUB_OUTPUT
              echo "::notice::Infrastructure changes detected — review what-if output above"
            else
              echo "changes_detected=false" >> $GITHUB_OUTPUT
              echo "::notice::No infrastructure changes detected"
            fi
          else
            echo "::warning::No main.bicep found — skipping what-if"
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload What-If Report
        if: ${{ github.event.inputs.skip_what_if != 'true' && hashFiles('what-if-output.txt') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: what-if-report
          path: what-if-output.txt
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Manual Approval Gate
  # Environment protection rules should be configured in GitHub settings:
  # - Required reviewers for staging/prod
  # - Deployment branches restricted to main
  # ─────────────────────────────────────────────────────────────────────────────
  approve:
    name: Approval Gate
    runs-on: ubuntu-latest
    needs: validate
    environment: 
      name: ${{ github.event.inputs.environment || 'dev' }}-approval
      # NOTE: Configure environment protection rules in GitHub repository settings:
      # 1. Go to Settings > Environments
      # 2. Create environments: dev-approval, staging-approval, prod-approval
      # 3. For staging-approval and prod-approval:
      #    - Enable "Required reviewers" and add appropriate team members
      #    - Enable "Prevent self-review" for prod
      # 4. Optionally add deployment branch rules to restrict to main
    steps:
      - name: Approval checkpoint
        run: |
          echo "✅ Deployment approved for environment: ${{ env.AZURE_ENV_NAME }}"
          echo "Proceeding with infrastructure deployment..."

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy Infrastructure with azd provision
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: approve
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Configure azd auth
        run: |
          azd auth login \
            --client-id "${{ env.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ env.AZURE_TENANT_ID }}"

      - name: Initialize azd environment
        run: |
          azd env new "${{ env.AZURE_ENV_NAME }}" --no-prompt || true
          azd env select "${{ env.AZURE_ENV_NAME }}" --no-prompt
          
          # Set environment variables
          azd env set AZURE_LOCATION "${{ env.AZURE_LOCATION }}"
          azd env set AZURE_SUBSCRIPTION_ID "${{ env.AZURE_SUBSCRIPTION_ID }}"

      - name: Provision Infrastructure
        run: |
          echo "🚀 Starting infrastructure provisioning..."
          azd provision --no-prompt
        env:
          AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}

      - name: Output deployment summary
        if: success()
        run: |
          echo "✅ Infrastructure deployment completed successfully!"
          echo ""
          echo "Environment: ${{ env.AZURE_ENV_NAME }}"
          echo "Location: ${{ env.AZURE_LOCATION }}"
          echo ""
          echo "Next steps:"
          echo "  1. Run deploy-apps workflow to deploy application containers"
          echo "  2. Use Azure Bastion to access the private network"

      - name: Handle deployment failure
        if: failure()
        run: |
          echo "❌ Infrastructure deployment failed!"
          echo ""
          echo "Troubleshooting steps:"
          echo "  1. Check the Azure Activity Log for detailed error messages"
          echo "  2. Verify OIDC credentials and permissions"
          echo "  3. Run preflight script locally: ./scripts/preflight.ps1"
          echo "  4. Review what-if output for potential conflicts"
          exit 1
