# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: private-rag-accelerator
metadata:
  template: private-rag-accelerator

# Infrastructure path for Bicep deployments
infra:
  provider: bicep
  path: ./infra

services:
  api:
    project: ./apps/api
    language: python
    host: containerapp
    docker:
      path: ./apps/api/Dockerfile
      context: ./apps/api

  ingest:
    project: ./apps/ingest
    language: python
    host: containerapp
    docker:
      path: ./apps/ingest/Dockerfile
      context: ./apps/ingest

  web:
    project: ./apps/web
    language: js
    host: containerapp
    docker:
      path: ./apps/web/Dockerfile
      context: ./apps/web

# Lifecycle hooks — see scripts/postprovision.ps1 (T047)
hooks:
  postprovision:
    shell: pwsh
    run: ./scripts/postprovision.ps1
    interactive: false
    continueOnError: false
